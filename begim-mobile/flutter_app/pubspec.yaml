name: begim
description: Begim — Uy shirinliklari bozori (Marketplace for homemade sweets)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.0
  
  # State Management (BLoC Pattern)
  flutter_bloc: ^8.1.4
  equatable: ^2.0.5
  
  # Navigation
  go_router: ^13.0.1
  
  # Dependency Injection
  get_it: ^7.6.7
  injectable: ^2.3.2
  
  # Networking & API
  dio: ^5.4.0
  retrofit: ^4.0.3
  json_annotation: ^4.8.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Image Handling
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  
  # Utils
  intl: ^0.19.0
  freezed_annotation: ^2.4.1
  dartz: ^0.10.1  # Functional programming (Either type)
  
  # Telegram Integration (future)
  # telegram_web_app: ^0.0.1
  
  # Analytics & Crash Reporting
  # firebase_analytics: ^10.8.0
  # firebase_crashlytics: ^3.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code Generation
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1
  retrofit_generator: ^8.0.6
  
  # Testing
  mockito: ^5.4.4
  bloc_test: ^9.1.5

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
