[pytest]
asyncio_mode = auto
testpaths =
    tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .
addopts = -v --tb=short
log_cli = true
filterwarnings =
    ignore::DeprecationWarning
markers =
    slow: marks tests as slow
    integration: marks tests as integration tests