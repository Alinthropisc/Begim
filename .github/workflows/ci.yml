name: 🔍 CI — Lint & Unit Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────────
  backend-lint:
    name: 🐍 Python Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: begim-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install deps
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

  # ────────────────────────────────────────────
  backend-unit-tests:
    name: 🧪 Python Unit Tests (no DB)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: begim-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install deps
        run: uv sync --frozen

      - name: Run unit tests
        run: uv run pytest -v --tb=short -m "not integration" --ignore=tests/test_api_integration.py
        env:
          APP_ENV: test
          SECRET_KEY: ci-test-secret-key-minimum-32-chars!!
          DATABASE_URL: mysql+aiomysql://user:pass@localhost/begim
          REDIS_URL: redis://localhost:6379/0
          TELEGRAM_BOT_TOKEN: ""

  # ────────────────────────────────────────────
  shared-tests:
    name: 🔗 Shared — Unit Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: begim-shared

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: begim-shared/package-lock.json

      - name: Install
        run: npm ci

      - name: Run tests
        run: npm test

  # ────────────────────────────────────────────
  frontend-miniapp:
    name: ⚡ Mini App — TS check + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: begim-miniapp

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: begim-miniapp/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000/api/v1

  # ────────────────────────────────────────────
  frontend-admin:
    name: ⚡ Admin — TS check + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: begim-admin

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: begim-admin/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000/api/v1
