<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#8B2635" />
    <title>Begim — Uy shirinliklari bozori</title>
    
    <!-- Вызываем ready() сразу через нативный прокси — не ждём SDK -->
    <script>
      try {
        if (window.TelegramWebviewProxy) {
          window.TelegramWebviewProxy.postEvent('web_app_ready', '{}');
        }
      } catch(e) {}
    </script>

    <!-- Telegram WebApp SDK — async, не блокирует рендер -->
    <script async src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Amiri:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    
    <style>
      html {
        background-color: #FBF5EC;
        height: 100%;
      }
      body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #FBF5EC;
        height: 100%;
        overscroll-behavior: none;
      }
      #root {
        height: 100%;
        min-height: var(--tg-viewport-height, 100svh);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
